<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap&family=VT323&display=swap"
      rel="stylesheet"
    />
    <title>Minesweeper</title>
  </head>
  <body>
    <div id="app">
      <div id="game">
        <div id="game-header">
          <div id="difficulty-selector">
            <select id="difficulty-select">
              <option value="BEGINNER">Beginner</option>
              <option value="INTERMEDIATE">Intermediate</option>
              <option value="EXPERT">Expert</option>
            </select>
          </div>
          <div id="game-stats">
            <div class="stat-container">
              <div class="stat-label">Mines</div>
              <div id="mines-display" class="led-display">
                <span class="led-digits">010</span>
              </div>
            </div>
            <div class="stat-container">
              <div class="stat-label">Time</div>
              <div id="timer-display" class="led-display">
                <span class="led-digits">000</span>
              </div>
            </div>
          </div>
        </div>
        <div id="main-text">
          <h3 id="heading">Minesweeper</h3>
          <p id="instructions">
            Click to play.<br />Right click to place flags.
          </p>
        </div>
        <div id="board"></div>
      </div>
    </div>
    <footer>
      <p class="footer-text">Tribute to my first ever Windows game</p>
    </footer>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
